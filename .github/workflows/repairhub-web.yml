name: repairhub-web

on:
  push:
    paths:
      - "repairhub-web/**"
      - ".github/workflows/repairhub-web.yml"
  pull_request:
    paths:
      - "repairhub-web/**"
      - ".github/workflows/repairhub-web.yml"

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: repairhub-web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: repairhub-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test
      - run: npm run build
